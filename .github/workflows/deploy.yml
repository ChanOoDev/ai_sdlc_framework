name: Deploy

on:
  push:
    branches: [master]

  # Allow manual deployment
  workflow_dispatch:

jobs:
  # ─── Step 1: CI (Lint + Test + Security + Build) ─────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ─── Step 2: Deploy Preview (Staging) ────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [ci]
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n${process.env.PREVIEW_URL}\n\nReview and approve to deploy to production.`
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}

  # ─── Step 3: Approval Gate (Manual) ──────────────────────────
  approve:
    name: Approve for Production
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    environment:
      name: production
      url: ${{ needs.deploy-preview.outputs.preview-url }}
    steps:
      - name: Approval received
        run: echo "✅ Approved for production deployment"

  # ─── Step 4: UAT Verification (Manual) ──────────────────────
  uat:
    name: UAT Verification
    runs-on: ubuntu-latest
    needs: [approve, deploy-preview]
    environment:
      name: uat
      url: ${{ needs.deploy-preview.outputs.preview-url }}
    steps:
      - name: UAT passed
        run: echo "✅ UAT verification passed"

  # ─── Step 5: Deploy Production ───────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [uat, deploy-preview]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Final verification
        run: |
          echo "✅ Production deployment complete"
          echo "URL: https://your-project.vercel.app"
